naftiko: "1.0.0-alpha1"

info:
  label: 3M Supply Chain Integration
  description: >-
    End-to-end supply chain integration workflow for 3M partners and suppliers.
    Combines product discovery, order management, delivery tracking, and invoice
    reconciliation into a unified workflow for procurement managers, supply chain
    analysts, and accounts payable teams.
  tags:
    - Manufacturing
    - Supply Chain
    - Procurement
    - Logistics
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      THREEEM_BEARER_TOKEN: THREEEM_BEARER_TOKEN

capability:
  consumes:
    - import: 3m-partner-supplier
      location: ./shared/3m-partner-supplier-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: 3m-supply-chain-api
      description: "Unified REST API for 3M supply chain integration."
      resources:
        - path: /v1/products
          name: products
          description: "3M product catalog and partner pricing."
          operations:
            - method: GET
              name: list-products
              description: "List 3M products available to the authenticated partner."
              call: "3m-partner-supplier.list-products"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: get-product-price
              description: "Get negotiated price for a specific 3M product."
              call: "3m-partner-supplier.get-product-price"
              with:
                productId: "rest.productId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/orders
          name: orders
          description: "Purchase order management."
          operations:
            - method: GET
              name: list-orders
              description: "List purchase orders with status information."
              call: "3m-partner-supplier.list-orders"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-order
              description: "Submit a new purchase order."
              call: "3m-partner-supplier.create-order"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/deliveries
          name: deliveries
          description: "Delivery tracking and logistics."
          operations:
            - method: GET
              name: list-deliveries
              description: "Track delivery status for partner orders."
              call: "3m-partner-supplier.list-deliveries"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/invoices
          name: invoices
          description: "Invoice retrieval for billing reconciliation."
          operations:
            - method: GET
              name: list-invoices
              description: "Retrieve invoices for billing reconciliation."
              call: "3m-partner-supplier.list-invoices"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: 3m-supply-chain-mcp
      transport: http
      description: "MCP server for AI-assisted 3M supply chain management."
      tools:
        - name: list-products
          description: "List 3M products available to the authenticated partner with pricing."
          hints:
            readOnly: true
            openWorld: false
          call: "3m-partner-supplier.list-products"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-product-price
          description: "Get the partner-negotiated price for a specific 3M product."
          hints:
            readOnly: true
            openWorld: false
          call: "3m-partner-supplier.get-product-price"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-orders
          description: "List purchase orders placed with 3M with status and tracking."
          hints:
            readOnly: true
            openWorld: false
          call: "3m-partner-supplier.list-orders"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-order
          description: "Submit a new purchase order for 3M products."
          hints:
            readOnly: false
            destructive: false
          call: "3m-partner-supplier.create-order"
          outputParameters:
            - type: object
              mapping: "$."

        - name: track-deliveries
          description: "Track delivery status and estimated arrival for 3M orders."
          hints:
            readOnly: true
            openWorld: false
          call: "3m-partner-supplier.list-deliveries"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-invoices
          description: "Retrieve 3M invoices for accounts payable reconciliation."
          hints:
            readOnly: true
            openWorld: false
          call: "3m-partner-supplier.list-invoices"
          outputParameters:
            - type: object
              mapping: "$."
