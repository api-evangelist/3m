naftiko: "1.0.0-alpha1"

info:
  label: 3M Partner and Supplier API
  description: >-
    Real-time access to 3M product catalog, pricing, orders, deliveries, and
    invoices for authorized partners and suppliers. Supports product lookups,
    order submission, delivery tracking, and invoice retrieval via OAuth 2.0
    bearer token authentication.
  tags:
    - Manufacturing
    - Supply Chain
    - Orders
    - Products
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      THREEEM_BEARER_TOKEN: THREEEM_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: 3m-partner-supplier
      baseUri: https://api.3m.com
      description: 3M Partner and Supplier API for supply chain integration
      authentication:
        type: bearer
        token: "{{THREEEM_BEARER_TOKEN}}"
      resources:
        - name: products
          path: /products
          description: Product catalog and pricing operations
          operations:
            - name: list-products
              method: GET
              description: 3M List Products
              inputParameters:
                - name: category
                  in: query
                  type: string
                  required: false
                  description: Filter products by category
                - name: sku
                  in: query
                  type: string
                  required: false
                  description: Filter by specific SKU
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: get-product-price
              method: GET
              description: 3M Get Product Price
              inputParameters:
                - name: productId
                  in: path
                  type: string
                  required: true
                  description: The unique product identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.

        - name: orders
          path: /orders
          description: Order submission and tracking
          operations:
            - name: list-orders
              method: GET
              description: 3M List Orders
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: Filter orders by status
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: Filter orders from this date
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: create-order
              method: POST
              description: 3M Create an Order
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              body:
                type: json
                data:
                  items: "{{tools.items}}"
                  shippingAddress: "{{tools.shippingAddress}}"

        - name: deliveries
          path: /deliveries
          description: Delivery tracking operations
          operations:
            - name: list-deliveries
              method: GET
              description: 3M List Deliveries
              inputParameters:
                - name: orderId
                  in: query
                  type: string
                  required: false
                  description: Filter by order identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.

        - name: invoices
          path: /invoices
          description: Invoice retrieval operations
          operations:
            - name: list-invoices
              method: GET
              description: 3M List Invoices
              inputParameters:
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: Filter invoices from this date
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: Filter invoices up to this date
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.

  exposes:
    - type: rest
      port: 8100
      namespace: 3m-partner-supplier-rest
      resources:
        - path: /v1/products
          name: products
          description: 3M product catalog and pricing
          operations:
            - method: GET
              name: list-products
              description: List 3M products available to partners
              call: "3m-partner-supplier.list-products"
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/orders
          name: orders
          description: 3M order management
          operations:
            - method: GET
              name: list-orders
              description: List partner orders
              call: "3m-partner-supplier.list-orders"
              outputParameters:
                - type: object
                  mapping: $.

    - type: mcp
      port: 9100
      namespace: 3m-partner-supplier-mcp
      transport: http
      tools:
        - name: list-products
          description: List 3M products available to the authenticated partner
          hints:
            readOnly: true
            openWorld: false
          call: "3m-partner-supplier.list-products"
          outputParameters:
            - type: object
              mapping: $.
        - name: get-product-price
          description: Get the negotiated price for a specific 3M product
          hints:
            readOnly: true
            openWorld: false
          call: "3m-partner-supplier.get-product-price"
          outputParameters:
            - type: object
              mapping: $.
        - name: list-orders
          description: List purchase orders with status and tracking
          hints:
            readOnly: true
            openWorld: false
          call: "3m-partner-supplier.list-orders"
          outputParameters:
            - type: object
              mapping: $.
        - name: create-order
          description: Submit a new purchase order for 3M products
          hints:
            readOnly: false
            destructive: false
          call: "3m-partner-supplier.create-order"
          outputParameters:
            - type: object
              mapping: $.
        - name: list-deliveries
          description: Track delivery status for partner orders
          hints:
            readOnly: true
            openWorld: false
          call: "3m-partner-supplier.list-deliveries"
          outputParameters:
            - type: object
              mapping: $.
        - name: list-invoices
          description: Retrieve invoice summaries for billing reconciliation
          hints:
            readOnly: true
            openWorld: false
          call: "3m-partner-supplier.list-invoices"
          outputParameters:
            - type: object
              mapping: $.
