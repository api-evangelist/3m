naftiko: 1.0.0-alpha2
info:
  label: 3M Partner and Supplier API — Invoices
  description: '3M Partner and Supplier API — Invoices. 1 operations. Lead operation: 3M List Invoices. Self-contained Naftiko
    capability covering one 3m business surface.'
  tags:
  - 3m
  - Invoices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    3M_API_KEY: 3M_API_KEY
capability:
  consumes:
  - type: http
    namespace: partner-supplier-invoices
    baseUri: https://api.3m.com
    description: 3M Partner and Supplier API — Invoices business capability. Self-contained, no shared references.
    resources:
    - name: invoices
      path: /invoices
      operations:
      - name: listinvoices
        method: GET
        description: 3M List Invoices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startDate
          in: query
          type: string
          description: Filter invoices from this date.
        - name: endDate
          in: query
          type: string
          description: Filter invoices up to this date.
    authentication:
      type: bearer
      token: '{{env.3M_API_KEY}}'
  exposes:
  - type: rest
    namespace: partner-supplier-invoices-rest
    port: 8080
    description: REST adapter for 3M Partner and Supplier API — Invoices. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/invoices
      name: invoices
      description: REST surface for invoices.
      operations:
      - method: GET
        name: listinvoices
        description: 3M List Invoices
        call: partner-supplier-invoices.listinvoices
        with:
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: partner-supplier-invoices-mcp
    port: 9090
    transport: http
    description: MCP adapter for 3M Partner and Supplier API — Invoices. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: 3m-list-invoices
      description: 3M List Invoices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: partner-supplier-invoices.listinvoices
      with:
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
