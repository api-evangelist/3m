meters:
  - name: partner_contract
    description: Master trading-partner contract — not a metered unit; cost flows through goods/services
      pricing rather than per-API-call.
    unit: contract
    aggregation: count
    dimensions:
      - partner
principles:
  - name: Visibility
    description: Track API integration cost as part of partner-onboarding and IT integration spend; 3M
      does not provide a metered usage feed.
  - name: Allocation
    description: Allocate the integration cost to the procurement / supply-chain function that owns the
      3M trading relationship.
  - name: Optimization
    description: Optimize by consolidating order/delivery/invoice queries into batch flows rather than
      polling, in line with the partner contract's throughput expectations.
  - name: Accountability
    description: Procurement leadership owns the 3M relationship; IT owns the integration runtime. Review
      transaction volume against contract terms during partner business reviews.
