description: 3M's Partner and Supplier API is delivered under a commercial trading-partner contract; there
  is no consumption-based pricing or public billing surface. FinOps mapping is structural only.
notes: No public developer pricing — placeholder only. Costs flow through the master partner agreement,
  not a metered API invoice.
