description: 3M's Partner and Supplier API is a B2B EDI-style integration provided to existing trading
  partners under their commercial supplier agreement. There is no public developer portal, no pay-as-you-go
  pricing, and no published API plan tiers. Access and limits are negotiated as part of the partner contract.
notes: No public developer pricing — placeholder only. Access is gated to existing 3M partners and suppliers
  via their commercial relationship.
